name: Security & Quality Analysis

# This workflow runs on all branches (except main, which uses pr-validation.yml and main-build.yml)
# Use this for quick feedback during development on feature branches

on:
  push:
    branches:
      - '**'  # Run on all branches
      - '!main'  # Except main (handled by main-build.yml)
  pull_request:
    branches:
      - '**'
      - '!main'  # PRs to main use pr-validation.yml

jobs:
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github
        continue-on-error: true

      - name: Run Ruff formatter check
        run: |
          ruff format --check .
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          python -m pytest -m "not integration" --cov=homelab_subs --cov-report=xml --cov-report=term --cov-report=html | tee coverage-output.txt
          # Extract coverage percentage for summary
          COVERAGE=$(grep -oP 'TOTAL.*\s+\K\d+%' coverage-output.txt || echo "N/A")
          echo "COVERAGE_PERCENT=$COVERAGE" >> $GITHUB_ENV
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        id: coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

  security-python:
    name: Python Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run Bandit security scan
        run: |
          bandit -r src/homelab_subs -f json -o bandit-report.json
          bandit -r src/homelab_subs -f screen
        continue-on-error: true

      - name: Run Safety dependency check
        run: |
          safety check --json --output safety-report.json || true
          safety check || true
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: python-security-reports
          path: |
            bandit-report.json
            safety-report.json

  semgrep:
    name: Semgrep Static Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep
        run: |
          semgrep scan --config auto --json --output semgrep-report.json || true
          semgrep scan --config auto || true
        continue-on-error: true

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: semgrep-report
          path: semgrep-report.json

  docker-security:
    name: Docker Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: DockerFile
          failure-threshold: warning
          format: sarif
          output-file: hadolint-report.sarif
        continue-on-error: true

      - name: Upload Hadolint report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: hadolint-report
          path: hadolint-report.sarif

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.8.0

      - name: Build Docker image
        run: |
          docker build -t homelab-subtitle-service:test -f DockerFile .

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e # v0.28.0
        with:
          image-ref: homelab-subtitle-service:test
          format: 'sarif'
          output: 'trivy-image-report.sarif'
        continue-on-error: true

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e # v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-report.sarif'
        continue-on-error: true

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: trivy-reports
          path: |
            trivy-image-report.sarif
            trivy-fs-report.sarif

  summary:
    name: Generate Security Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security-python, semgrep, docker-security]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: security-reports

      - name: Create summary
        run: |
          echo "## 🔒 Security & Quality Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract coverage percentage from coverage.xml if available
          if [ -f security-reports/coverage-report/coverage.xml ]; then
            COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' security-reports/coverage-report/coverage.xml | head -1)
            if [ -n "$COVERAGE" ]; then
              COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d. -f1)
              echo "### 📊 Test Coverage: ${COVERAGE_PERCENT}%" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              # Add coverage badge color based on percentage
              if [ "$COVERAGE_PERCENT" -ge 80 ]; then
                echo "🟢 **Excellent** coverage!" >> $GITHUB_STEP_SUMMARY
              elif [ "$COVERAGE_PERCENT" -ge 60 ]; then
                echo "🟡 **Good** coverage, but could be improved." >> $GITHUB_STEP_SUMMARY
              else
                echo "🔴 **Low** coverage - consider adding more tests." >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "### ✅ Completed Scans" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff (Code Quality & Formatting)" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit (Python Security)" >> $GITHUB_STEP_SUMMARY
          echo "- Safety (Dependency Vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep (Static Analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy (Docker & Filesystem)" >> $GITHUB_STEP_SUMMARY
          echo "- Hadolint (Dockerfile Best Practices)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Download detailed reports from the artifacts section above." >> $GITHUB_STEP_SUMMARY
